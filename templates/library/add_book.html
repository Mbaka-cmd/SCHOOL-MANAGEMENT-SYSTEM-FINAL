{% extends 'base.html' %}
{% block title %}Add Book{% endblock %}
{% block content %}
<div style="background:linear-gradient(135deg,#8B1A1A,#c0392b);padding:2rem;color:white;margin-bottom:2rem;">
  <div style="max-width:600px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;">
    <h1 style="margin:0;font-size:1.8rem;">+ Add New Book</h1>
    <a href="{% url 'library_dashboard' %}" style="background:rgba(255,255,255,0.2);color:white;padding:0.6rem 1.2rem;border-radius:8px;text-decoration:none;font-weight:600;">? Back</a>
  </div>
</div>
<div style="max-width:600px;margin:0 auto;padding:0 1rem;">
  <div style="background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);padding:2rem;">
    <form method="post">
      {% csrf_token %}
      <div style="margin-bottom:1.25rem;"><label style="display:block;font-weight:600;margin-bottom:0.4rem;">Title *</label><input name="title" required style="width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;box-sizing:border-box;"></div>
      <div style="margin-bottom:1.25rem;"><label style="display:block;font-weight:600;margin-bottom:0.4rem;">Author *</label><input name="author" required style="width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;box-sizing:border-box;"></div>
      <div style="margin-bottom:1.25rem;"><label style="display:block;font-weight:600;margin-bottom:0.4rem;">ISBN</label><input name="isbn" style="width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;box-sizing:border-box;"></div>
      <div style="margin-bottom:1.25rem;"><label style="display:block;font-weight:600;margin-bottom:0.4rem;">Category</label><select name="category" style="width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;"><option value="textbook">Textbook</option><option value="fiction">Fiction</option><option value="non_fiction">Non-Fiction</option><option value="reference">Reference</option><option value="magazine">Magazine</option><option value="other">Other</option></select></div>
      <div style="margin-bottom:1.25rem;"><label style="display:block;font-weight:600;margin-bottom:0.4rem;">Number of Copies</label><input name="total_copies" type="number" min="1" value="1" style="width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;box-sizing:border-box;"></div>
      <div style="margin-bottom:1.5rem;"><label style="display:block;font-weight:600;margin-bottom:0.4rem;">Shelf Location</label><input name="shelf_location" placeholder="e.g. A1, B3" style="width:100%;padding:0.75rem;border:1px solid #ddd;border-radius:8px;font-size:0.95rem;box-sizing:border-box;"></div>
      <button type="submit" style="width:100%;background:#8B1A1A;color:white;padding:0.875rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;">Save Book</button>
    </form>
  </div>
</div>
{% endblock %}
